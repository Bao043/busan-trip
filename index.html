<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>釜山行 · Bao043 Trip</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;900&family=Noto+Sans+TC:wght@400;500;700&family=Manrope:wght@600;800&display=swap" rel="stylesheet">
    <!-- 使用 FontAwesome 模擬圖標 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #FDFBF7;
            --card: #FFFFFF;
            --accent: #FF8E7E; /* 暖橘紅 */
            --sub-accent: #6BAEB1; /* 莫蘭迪綠 */
            --text: #443F3A;
            --muted: #A39E98;
            --shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; background: var(--bg); color: var(--text);
            font-family: 'Noto Sans TC', sans-serif;
            display: flex; justify-content: center;
        }

        .phone-frame {
            width: 100%; max-width: 430px; min-height: 100vh;
            background: var(--bg); position: relative; padding-bottom: 100px;
        }

        /* --- Header --- */
        header { padding: 40px 24px 10px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; }
        .weather { background: white; padding: 6px 12px; border-radius: 20px; box-shadow: var(--shadow); font-size: 14px; }
        h1 { font-family: 'Noto Serif TC', serif; font-size: 32px; margin: 15px 0 5px; }
        .trip-date { color: var(--muted); font-size: 14px; margin-bottom: 20px; }

        /* --- 日期滑動 (義大利暖色調) --- */
        .day-scroller {
            display: flex; gap: 12px; overflow-x: auto; padding: 0 24px 15px; scrollbar-width: none;
        }
        .day-scroller::-webkit-scrollbar { display: none; }
        .day-btn {
            flex: 0 0 65px; height: 85px; background: white; border-radius: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: var(--shadow); cursor: pointer; transition: 0.3s; border: none;
        }
        .day-btn.active { background: var(--text); color: white; transform: translateY(-5px); }
        .day-btn .m { font-size: 11px; opacity: 0.7; }
        .day-btn .d { font-size: 22px; font-weight: 800; font-family: 'Manrope'; margin: 2px 0; }
        .day-btn .w { font-size: 10px; font-weight: 700; }

        /* --- 頁面內容 --- */
        .page { display: none; padding: 0 24px; animation: fadeInUp 0.5s ease; }
        .page.active { display: block; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .section-header { display: flex; justify-content: space-between; align-items: center; margin: 25px 0 15px; }
        .section-header h2 { font-family: 'Noto Serif TC'; font-size: 20px; margin: 0; }
        .share-tag { color: var(--accent); font-size: 12px; font-weight: 700; cursor: pointer; border: 1.5px solid var(--accent); padding: 4px 12px; border-radius: 15px; }

        /* --- 行程卡片 (路徑風) --- */
        .route-card { background: white; border-radius: 25px; padding: 25px; box-shadow: var(--shadow); }
        .route-item { display: flex; gap: 15px; position: relative; padding-bottom: 30px; }
        .route-item:last-child { padding-bottom: 0; }
        .route-item::before { content: ''; position: absolute; left: 8px; top: 25px; bottom: 0; border-left: 2px dashed #EEE; }
        .route-item:last-child::before { display: none; }
        .dot { width: 18px; height: 18px; background: white; border: 4px solid var(--sub-accent); border-radius: 50%; z-index: 1; margin-top: 3px; }
        .info { flex: 1; }
        .time { font-family: 'Manrope'; font-weight: 800; color: var(--sub-accent); font-size: 14px; }
        .place { font-weight: 700; font-size: 17px; margin: 3px 0; }
        .note { font-size: 13px; color: var(--muted); line-height: 1.5; }

        /* --- 記帳與工具 --- */
        .tool-card { background: white; border-radius: 25px; padding: 20px; box-shadow: var(--shadow); margin-bottom: 15px; }
        .calc-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 5px; }
        input { width: 100%; border: 1.5px solid #F3F1ED; border-radius: 12px; padding: 12px; font-size: 16px; font-family: 'Manrope'; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--accent); }
        .result-box { background: #FFF9F8; border-radius: 15px; padding: 15px; text-align: center; border: 1px solid #FFE4E1; }
        .res-val { font-size: 20px; font-weight: 800; color: var(--accent); display: block; }
        
        .ledger-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #F9F9F9; font-size: 15px; }

        /* --- Bottom Nav --- */
        .bottom-nav {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 380px; height: 75px;
            background: rgba(255,255,255,0.9); backdrop-filter: blur(15px);
            border-radius: 40px; box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            display: flex; justify-content: space-around; align-items: center; padding: 0 10px;
        }
        .nav-btn { display: flex; flex-direction: column; align-items: center; color: var(--muted); cursor: pointer; transition: 0.3s; }
        .nav-btn.active { color: var(--accent); font-weight: 700; }
        .nav-btn i { font-size: 22px; margin-bottom: 4px; }
        .nav-btn span { font-size: 11px; }

    </style>
</head>
<body>

<div class="phone-frame">
    <header>
        <div class="top-bar">
            <div class="weather" id="real-weather">釜山 18°C 🌤️</div>
            <div onclick="shareTrip()" class="share-tag"><i class="fa-solid fa-share-nodes"></i> 分享</div>
        </div>
        <h1 id="main-title">釜山之旅</h1>
        <div class="trip-date">2024.11.10 - 11.14 (5天4夜)</div>
    </header>

    <div class="day-scroller">
        <button class="day-btn active" onclick="switchDay(1, this)">
            <span class="m">11月</span><span class="d">10</span><span class="w">SUN</span>
        </button>
        <button class="day-btn" onclick="switchDay(2, this)">
            <span class="m">11月</span><span class="d">11</span><span class="w">MON</span>
        </button>
        <button class="day-btn" onclick="switchDay(3, this)">
            <span class="m">11月</span><span class="d">12</span><span class="w">TUE</span>
        </button>
        <button class="day-btn" onclick="switchDay(4, this)">
            <span class="m">11月</span><span class="d">13</span><span class="w">WED</span>
        </button>
        <button class="day-btn" onclick="switchDay(5, this)">
            <span class="m">11月</span><span class="d">14</span><span class="w">THU</span>
        </button>
    </div>

    <!-- 行程頁面 -->
    <section id="page-itinerary" class="page active">
        <div class="section-header">
            <h2>今日行程 <span id="day-num-label">Day 1</span></h2>
        </div>
        <div class="route-card" id="itinerary-content">
            <!-- 初始內容 -->
            <div class="route-item">
                <div class="dot"></div>
                <div class="info">
                    <div class="time">16:50</div>
                    <div class="place">桃園機場 TPE</div>
                    <div class="note">虎航 IT606，記得帶護照！</div>
                </div>
            </div>
            <div class="route-item">
                <div class="dot"></div>
                <div class="info">
                    <div class="time">20:05</div>
                    <div class="place">金海機場 PUS</div>
                    <div class="note">領取 WOWPASS ＆ 交通卡。</div>
                </div>
            </div>
        </div>
    </section>

    <!-- 工具 & 記帳頁面 -->
    <section id="page-tools" class="page">
        <div class="section-header"><h2>即時匯率與退稅</h2></div>
        <div class="tool-card">
            <div class="calc-row">
                <div><label>韓元 (KRW)</label><input type="number" id="krw" value="50000" oninput="updateCalc()"></div>
                <div><label>退稅 %</label><input type="number" id="tax-rate" value="7" oninput="updateCalc()"></div>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div class="result-box"><span style="font-size: 11px; color: #999;">約合台幣</span><span class="res-val" id="twd-res">NT$ 1,176</span></div>
                <div class="result-box"><span style="font-size: 11px; color: #999;">退稅可領</span><span class="res-val" id="tax-res">₩ 3,500</span></div>
            </div>
            <p style="text-align: center; font-size: 11px; color: #BBB; margin-top: 10px;">1 TWD ≈ 42.5 KRW (僅供參考)</p>
        </div>

        <div class="section-header"><h2>快速記帳</h2></div>
        <div class="tool-card">
            <div style="display: flex; gap: 8px;">
                <input type="text" id="exp-name" placeholder="項目" style="flex:2">
                <input type="number" id="exp-amt" placeholder="韓元" style="flex:1">
                <button onclick="addExp()" style="background:var(--accent); color:white; border:none; padding: 0 15px; border-radius: 12px; font-weight: bold;">+</button>
            </div>
            <div id="ledger" style="margin-top:10px;"></div>
        </div>
    </section>

    <!-- 底部導航 -->
    <nav class="bottom-nav">
        <div class="nav-btn active" onclick="showPage('page-itinerary', this)">
            <i class="fa-solid fa-calendar-day"></i><span>每日行程</span>
        </div>
        <div class="nav-btn" onclick="showPage('page-tools', this)">
            <i class="fa-solid fa-calculator"></i><span>記帳/匯率</span>
        </div>
        <div class="nav-btn" onclick="alert('優惠券已存入 Bao043 錢包')">
            <i class="fa-solid fa-ticket"></i><span>優惠券</span>
        </div>
    </nav>
</div>

<script>
    const trip = {
        1: [
            { t: "16:50", p: "桃園機場 TPE", n: "IT606 準時登機" },
            { t: "20:05", p: "釜山金海機場", n: "辦理入境與網路卡" }
        ],
        2: [
            { t: "09:30", p: "甘川文化村", n: "找小王子拍照，韓服體驗" },
            { t: "12:00", p: "札嘎其市場", n: "海鮮大餐與國際市場逛街" }
        ],
        3: [
            { t: "10:30", p: "海雲台 Blue Line Park", n: "膠囊火車賞海景" },
            { t: "18:00", p: "廣安里大橋", n: "看夜景、喝咖啡" }
        ]
    };

    function switchDay(day, el) {
        document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('day-num-label').innerText = `Day ${day}`;
        
        const list = trip[day] || [{t:"--:--", p:"自由安排", n:"悠閒享受釜山時光"}];
        document.getElementById('itinerary-content').innerHTML = list.map(i => `
            <div class="route-item">
                <div class="dot"></div>
                <div class="info">
                    <div class="time">${i.t}</div>
                    <div class="place">${i.p}</div>
                    <div class="note">${i.n}</div>
                </div>
            </div>
        `).join('');
    }

    function showPage(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    function updateCalc() {
        const k = document.getElementById('krw').value;
        const t = document.getElementById('tax-rate').value;
        document.getElementById('twd-res').innerText = `NT$ ${Math.round(k / 42.5).toLocaleString()}`;
        document.getElementById('tax-res').innerText = `₩ ${Math.round(k * (t/100)).toLocaleString()}`;
    }

    function addExp() {
        const name = document.getElementById('exp-name').value;
        const amt = document.getElementById('exp-amt').value;
        if(!name || !amt) return;
        const div = document.createElement('div');
        div.className = 'ledger-item';
        div.innerHTML = `<span>${name}</span><span style="font-weight:800">₩ ${Number(amt).toLocaleString()}</span>`;
        document.getElementById('ledger').prepend(div);
        document.getElementById('exp-name').value = '';
        document.getElementById('exp-amt').value = '';
    }

    function shareTrip() {
        const url = window.location.href;
        navigator.clipboard.writeText(url);
        alert('分享連結已複製！傳給隊友吧：' + url);
    }
</script>
</body>
</html>
