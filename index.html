<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>釜山行 · BUSAN TRIP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&family=Noto+Sans+TC:wght@400;500;600;700&family=Manrope:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0F2438;
    --coral:#FF6F59;
    --sand:#F2E4C9;
    --teal:#1E7F82;
    --paper:#FBF7EF;
    --card-white:#FFFFFF;
    --line: rgba(15,36,56,0.1);
    --radius: 20px;
    --nav-h: 76px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{
    font-family:'Noto Sans TC', sans-serif;
    background:var(--paper); color:var(--navy);
    margin:0; min-height:100vh; padding-bottom: calc(var(--nav-h) + 20px);
  }
  .app{ max-width: 500px; margin: 0 auto; position: relative; }

  /* ---------- HERO & HEADER ---------- */
  .hero{
    background: linear-gradient(180deg, rgba(8,21,34,0.6) 0%, var(--navy) 100%), 
                url('https://images.unsplash.com/photo-1625899139925-57f71ba783b4?w=800&q=80') center/cover;
    color: #fff; padding: 30px 20px 25px; border-radius: 0 0 30px 30px;
  }
  .header-flex { display: flex; justify-content: space-between; align-items: flex-start; }
  .weather-box { background: rgba(255,255,255,0.15); padding: 8px 12px; border-radius: 15px; text-align: right; backdrop-filter: blur(5px); }
  .weather-temp { font-weight: 800; font-size: 18px; color: var(--sand); }
  .weather-city { font-size: 11px; opacity: 0.8; display: block; }
  
  h1 { font-family:'Noto Serif TC'; font-size: 32px; margin: 15px 0 5px; }
  .sub { font-size: 14px; opacity: 0.8; margin-bottom: 20px; }

  /* ---------- DAY SELECTOR (Original Style) ---------- */
  .day-strip{ display:flex; gap:10px; overflow-x:auto; padding-bottom:5px; scrollbar-width:none; }
  .day-strip::-webkit-scrollbar{display:none;}
  .day-chip{
    flex:0 0 60px; height:75px; border-radius: 12px 12px 6px 6px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    cursor:pointer; border:none; color:#fff; transition: 0.3s; background: #555;
  }
  .day-chip.active{ transform: translateY(-5px); box-shadow: 0 8px 15px rgba(0,0,0,0.3); }
  .day-chip.d1{ background:#E8654F; } .day-chip.d2{ background:#3C8C8A; }
  .day-chip.d3{ background:#D9A441; } .day-chip.d4{ background:#5E6FA3; }
  .day-chip.d5{ background:#C15C7B; }
  .day-chip span.d{ font-size:10px; opacity:0.8; }
  .day-chip span.n{ font-size:18px; font-weight:800; font-family:'Manrope'; }

  /* ---------- PANELS ---------- */
  .panel{ display:none; padding: 20px; animation: fadeIn 0.4s; }
  .panel.active{ display:block; }
  @keyframes fadeIn { from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }

  .card{ background:var(--card-white); border-radius: var(--radius); padding:18px; margin-bottom:15px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
  .section-title{ font-family:'Noto Serif TC'; font-size:20px; margin-bottom:15px; display:flex; justify-content:space-between; align-items:center; }

  /* ---------- ITINERARY (Japan Style Route) ---------- */
  .route-item { display: flex; gap: 15px; position: relative; padding-bottom: 25px; }
  .route-item::before { content:''; position:absolute; left:7px; top:20px; bottom:0; width:2px; border-left:2px dashed #eee; }
  .route-item:last-child::before { display:none; }
  .route-dot { width:16px; height:16px; border-radius:50%; background:white; border:4px solid var(--teal); z-index:1; margin-top:4px; }
  .route-time { font-family:'Manrope'; font-weight:700; color:var(--teal); font-size:14px; }
  .route-name { font-weight:700; font-size:16px; margin:2px 0; }
  .route-desc { font-size:13px; color:#666; }

  /* ---------- TOOLS (Calculator & Ledger) ---------- */
  .tool-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
  label { font-size: 12px; color: #888; display: block; margin-bottom: 5px; }
  input { width: 100%; border: 1px solid #eee; border-radius: 10px; padding: 10px; font-size: 16px; outline: none; background: #fdfdfd; }
  .res-box { background: #fef9f0; padding: 12px; border-radius: 12px; text-align: center; border: 1px solid #f2eada; }
  .res-val { font-size: 18px; font-weight: 800; color: var(--coral); display: block; }
  
  .btn-add { background: var(--teal); color: white; border: none; border-radius: 10px; padding: 10px 20px; font-weight: 700; cursor: pointer; width: 100%; margin-top: 10px; }
  .ledger-list { margin-top: 15px; }
  .ledger-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f5f5f5; font-size: 14px; }

  /* ---------- BOTTOM NAV ---------- */
  .bottom-nav{
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
    width:90%; height:var(--nav-h); background:#fff; border-radius:35px;
    display:flex; align-items:center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); z-index:100;
  }
  .nav-btn{
    flex:1; display:flex; flex-direction:column; align-items:center; 
    border:none; background:none; color:#aaa; cursor:pointer; font-size:11px;
  }
  .nav-btn.active{ color: var(--coral); font-weight:700; }
  .nav-btn svg{ width:22px; height:22px; margin-bottom:4px; transition: 0.2s; }

  .share-btn { font-size: 12px; border: 1px solid var(--coral); color: var(--coral); padding: 4px 10px; border-radius: 10px; cursor: pointer; }
</style>
</head>
<body>

<div class="app">
  <div class="hero">
    <div class="header-flex">
      <div>
        <span style="font-size: 12px; opacity: 0.7; letter-spacing: 1px;">SOUTH KOREA</span>
        <h1>釜山行</h1>
      </div>
      <div class="weather-box">
        <span class="weather-temp" id="temp-display">16°C ☀️</span>
        <span class="weather-city">Busan</span>
      </div>
    </div>
    <div class="sub">11.10 → 11.14 · 5位大人</div>

    <div class="day-strip">
      <button class="day-chip d1 active" onclick="switchDay(1, this)"><span class="d">DAY</span><span class="n">1</span></button>
      <button class="day-chip d2" onclick="switchDay(2, this)"><span class="d">DAY</span><span class="n">2</span></button>
      <button class="day-chip d3" onclick="switchDay(3, this)"><span class="d">DAY</span><span class="n">3</span></button>
      <button class="day-chip d4" onclick="switchDay(4, this)"><span class="d">DAY</span><span class="n">4</span></button>
      <button class="day-chip d5" onclick="switchDay(5, this)"><span class="d">DAY</span><span class="n">5</span></button>
    </div>
  </div>

  <!-- 行程頁面 -->
  <section class="panel active" id="panel-itinerary">
    <div class="section-title">
      <span id="day-title">第一天行程</span>
      <div class="share-btn" onclick="copyLink()">分享網址</div>
    </div>
    <div class="card" id="itinerary-list">
      <!-- 內容由 JS 動態生成 -->
    </div>
  </section>

  <!-- 記帳與工具頁面 -->
  <section class="panel" id="panel-budget">
    <div class="section-title">匯率與退稅試算</div>
    <div class="card">
      <div class="tool-grid">
        <div>
          <label>輸入韓元 (KRW)</label>
          <input type="number" id="krw-input" placeholder="50000" oninput="doCalc()">
        </div>
        <div>
          <label>退稅/優惠 (%)</label>
          <input type="number" id="tax-percent" value="7" oninput="doCalc()">
        </div>
      </div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
        <div class="res-box"><span class="res-lbl" style="font-size:11px;color:#888">約合台幣</span><span class="res-val" id="twd-res">NT$ 0</span></div>
        <div class="res-box"><span class="res-lbl" style="font-size:11px;color:#888">退稅金額</span><span class="res-val" id="tax-res">₩ 0</span></div>
      </div>
    </div>

    <div class="section-title">隨時記帳</div>
    <div class="card">
      <div class="tool-grid">
        <input type="text" id="exp-name" placeholder="項目：例如 炸雞">
        <input type="number" id="exp-amt" placeholder="韓元金額">
      </div>
      <button class="btn-add" onclick="addExpense()">新增支出紀錄</button>
      <div class="ledger-list" id="ledger-list">
        <!-- 記帳列表 -->
      </div>
    </div>
  </section>

  <!-- 底部導航 -->
  <nav class="bottom-nav">
    <button class="nav-btn active" onclick="showPanel('panel-itinerary', this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/></svg>
      <span>每日行程</span>
    </button>
    <button class="nav-btn" onclick="showPanel('panel-budget', this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
      <span>帳務工具</span>
    </button>
    <button class="nav-btn" onclick="alert('優惠券模組載入中...')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
      <span>優惠券</span>
    </button>
  </nav>
</div>

<script>
  // 行程資料
  const tripData = {
    1: { title: "Day 1 · 抵達釜山", items: [
      { time: "16:50", name: "桃園機場 (IT606)", desc: "預計 20:05 抵達金海機場" },
      { time: "21:30", name: "飯店 Check-in", desc: "南浦洞周邊住宿" }
    ]},
    2: { title: "Day 2 · 文化村巡禮", items: [
      { time: "10:00", name: "甘川洞文化村", desc: "小王子雕像排隊拍照" },
      { time: "14:00", name: "札嘎其市場", desc: "新鮮海鮮午餐" }
    ]},
    3: { title: "Day 3 · 海濱風光", items: [
      { time: "11:00", name: "海雲台 Blue Line Park", desc: "膠囊小火車賞海景" },
      { time: "19:00", name: "廣安里大橋", desc: "看夜景、喝咖啡" }
    ]},
    4: { title: "Day 4 · 購物與溫泉", items: [
      { time: "13:00", name: "新世界百貨", desc: "Spa Land 溫泉體驗" },
      { time: "18:00", name: "西面站逛街", desc: "地下街採購" }
    ]},
    5: { title: "Day 5 · 歸賦", items: [
      { time: "11:00", name: "樂天超市", desc: "最後伴手禮採買" },
      { time: "20:50", name: "金海機場 (IT607)", desc: "返回桃園" }
    ]}
  };

  // 切換日期
  function switchDay(day, btn) {
    document.querySelectorAll('.day-chip').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    
    const data = tripData[day];
    document.getElementById('day-title').innerText = data.title;
    
    let html = '';
    data.items.forEach(item => {
      html += `
        <div class="route-item">
          <div class="route-dot"></div>
          <div class="info">
            <div class="route-time">${item.time}</div>
            <div class="route-name">${item.name}</div>
            <div class="route-desc">${item.desc}</div>
          </div>
        </div>`;
    });
    document.getElementById('itinerary-list').innerHTML = html;
  }

  // 切換主面板
  function showPanel(id, btn) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    btn.classList.add('active');
  }

  // 匯率試算 (預設 1台幣 = 42.5 韓元)
  function doCalc() {
    const krw = document.getElementById('krw-input').value || 0;
    const tax = document.getElementById('tax-percent').value || 0;
    const twd = Math.round(krw / 42.5);
    const refund = Math.round(krw * (tax / 100));
    
    document.getElementById('twd-res').innerText = `NT$ ${twd.toLocaleString()}`;
    document.getElementById('tax-res').innerText = `₩ ${refund.toLocaleString()}`;
  }

  // 記帳功能
  let expenses = JSON.parse(localStorage.getItem('busan_exp')) || [];
  function renderLedger() {
    const list = document.getElementById('ledger-list');
    list.innerHTML = expenses.map((ex, i) => `
      <div class="ledger-item">
        <span>${ex.name}</span>
        <span style="font-weight:700">₩ ${Number(ex.amt).toLocaleString()}</span>
      </div>
    `).reverse().join('');
  }

  function addExpense() {
    const name = document.getElementById('exp-name').value;
    const amt = document.getElementById('exp-amt').value;
    if(!name || !amt) return;
    expenses.push({ name, amt });
    localStorage.setItem('busan_exp', JSON.stringify(expenses));
    renderLedger();
    document.getElementById('exp-name').value = '';
    document.getElementById('exp-amt').value = '';
  }

  // 分享功能
  function copyLink() {
    navigator.clipboard.writeText(window.location.href);
    alert('網址已複製，可直接貼給朋友！');
  }

  // 初始化
  window.onload = () => {
    switchDay(1, document.querySelector('.day-chip.d1'));
    renderLedger();
    // 隨機模擬天氣
    const temps = ["14°C ☁️", "16°C ☀️", "15°C 🌤️"];
    document.getElementById('temp-display').innerText = temps[Math.floor(Math.random()*temps.length)];
  };
</script>
</body>
</html>
